name: Release And Publish

on:
    workflow_call:
        inputs:
            version:
                description: 'Release version without the tag prefix'
                required: true
                type: string
            publish_target:
                description: 'What to publish after the release is created: none, npm, or vscode'
                required: false
                type: string
                default: 'none'
            create_latest:
                description: 'Mark the GitHub release as latest'
                required: false
                type: boolean
                default: true
            working_directory:
                description: 'Repository directory where release and publish commands should run'
                required: false
                type: string
                default: '.'
            workspace:
                description: 'Workspace package name to version or publish'
                required: false
                type: string
                default: ''
            package_json_path:
                description: 'Path to the package.json that owns the released version'
                required: false
                type: string
                default: 'package.json'
            package_lock_path:
                description: 'Path to the package-lock.json to commit, if present'
                required: false
                type: string
                default: 'package-lock.json'
            node_version_file:
                description: 'Node version file path'
                required: false
                type: string
                default: '.nvmrc'
            tag_prefix:
                description: 'Tag prefix such as v or @scope/pkg@'
                required: false
                type: string
                default: 'v'
            commit_message:
                description: 'Commit message template. {old}, {new}, {tag}, and {package} are replaced.'
                required: false
                type: string
                default: 'chore(release): bump {package} from {old} to {new}'
            extra_commit_paths:
                description: 'Extra newline-separated paths to include in the release commit'
                required: false
                type: string
                default: ''
            checkout_fetch_depth:
                description: 'Git history depth for checkout'
                required: false
                type: string
                default: '0'
            install_command:
                description: 'Command used to install dependencies before publishing'
                required: false
                type: string
                default: 'npm install'
            check_command:
                description: 'Command used to validate the package before publishing'
                required: false
                type: string
                default: ''
            build_command:
                description: 'Command used to build before npm publishing'
                required: false
                type: string
                default: 'npm run build'
            npm_access:
                description: 'npm publish access level'
                required: false
                type: string
                default: 'public'
            npm_provenance:
                description: 'Enable npm provenance'
                required: false
                type: boolean
                default: true
            package_command:
                description: 'Command used to build the VSIX package'
                required: false
                type: string
                default: 'npx @vscode/vsce package'
            publish_command:
                description: 'Command used to publish to the VS Code Marketplace'
                required: false
                type: string
                default: 'npx @vscode/vsce publish -p "$VSCE_PAT"'
            vsce_glob:
                description: 'Glob for the generated VSIX artifact'
                required: false
                type: string
                default: '*.vsix'
        secrets:
            NODE_AUTH_TOKEN:
                description: 'Token used for npm publishing'
                required: false
            VSCE_PAT:
                description: 'Token used to publish to the Visual Studio Marketplace'
                required: false
            GITHUB_TOKEN:
                description: 'Token used to upload release assets'
                required: false

jobs:
    validate:
        runs-on: ubuntu-latest
        steps:
            - name: Validate publish target
              shell: bash
              env:
                  VERSION: ${{ inputs.version }}
                  PUBLISH_TARGET: ${{ inputs.publish_target }}
                  WORKSPACE: ${{ inputs.workspace }}
                  NODE_TOKEN_SET: ${{ secrets.NODE_AUTH_TOKEN != '' }}
                  VSCE_PAT_SET: ${{ secrets.VSCE_PAT != '' }}
              run: |
                  if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
                    echo "Version must be a semantic version like 0.5.0 or 0.5.0-beta.1."
                    exit 1
                  fi

                  case "$PUBLISH_TARGET" in
                    none|npm|vscode) ;;
                    *)
                      echo "publish_target must be one of: none, npm, vscode"
                      exit 1
                      ;;
                  esac

                  if [ "$PUBLISH_TARGET" = "npm" ] && [ "$NODE_TOKEN_SET" != "true" ]; then
                    echo "NODE_AUTH_TOKEN secret is required when publish_target is npm."
                    exit 1
                  fi

                  if [ "$PUBLISH_TARGET" = "vscode" ] && [ "$VSCE_PAT_SET" != "true" ]; then
                    echo "VSCE_PAT secret is required when publish_target is vscode."
                    exit 1
                  fi

                  if [ "$PUBLISH_TARGET" = "npm" ] && [ -z "$WORKSPACE" ]; then
                    echo "Warning: npm publish will target the repository root package because workspace is empty."
                  fi

    release:
        needs: validate
        runs-on: ubuntu-latest
        outputs:
            tag: ${{ steps.package-meta.outputs.tag }}
            version: ${{ inputs.version }}
            package_name: ${{ steps.package-meta.outputs.package_name }}
        permissions:
            contents: write

        steps:
            - uses: krudi/reusable-actions/.github/actions/github-checkout@main
              with:
                  fetch_depth: ${{ inputs.checkout_fetch_depth }}

            - uses: krudi/reusable-actions/.github/actions/node-setup@main
              with:
                  cache: npm
                  node_version_file: ${{ inputs.node_version_file }}

            - name: Read current package metadata
              id: package-meta
              shell: bash
              env:
                  PACKAGE_JSON_PATH: ${{ inputs.package_json_path }}
                  TAG_PREFIX: ${{ inputs.tag_prefix }}
                  NEW_VERSION: ${{ inputs.version }}
              run: |
                  set -euo pipefail
                  OLD_VERSION="$(node -p "require('./${PACKAGE_JSON_PATH}').version")"
                  PACKAGE_NAME="$(node -p "require('./${PACKAGE_JSON_PATH}').name || ''")"

                  if [ "$OLD_VERSION" = "$NEW_VERSION" ]; then
                    echo "Version ${NEW_VERSION} is already set in ${PACKAGE_JSON_PATH}."
                    exit 1
                  fi

                  echo "old_version=$OLD_VERSION" >> "$GITHUB_OUTPUT"
                  echo "package_name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
                  echo "tag=${TAG_PREFIX}${NEW_VERSION}" >> "$GITHUB_OUTPUT"

            - name: Ensure release tag does not exist
              shell: bash
              env:
                  TAG_NAME: ${{ steps.package-meta.outputs.tag }}
              run: |
                  set -euo pipefail
                  git fetch --tags origin

                  if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
                    echo "Tag '$TAG_NAME' already exists locally."
                    exit 1
                  fi

                  if git ls-remote --exit-code --tags origin "refs/tags/$TAG_NAME" >/dev/null 2>&1; then
                    echo "Tag '$TAG_NAME' already exists on origin."
                    exit 1
                  fi

            - name: Bump package version
              shell: bash
              working-directory: ${{ inputs.working_directory }}
              env:
                  NEW_VERSION: ${{ inputs.version }}
                  WORKSPACE: ${{ inputs.workspace }}
              run: |
                  set -euo pipefail

                  if [ -n "$WORKSPACE" ]; then
                    npm version "$NEW_VERSION" --workspace="$WORKSPACE" --no-git-tag-version
                  else
                    npm version "$NEW_VERSION" --no-git-tag-version
                  fi

            - name: Verify release file version
              shell: bash
              env:
                  PACKAGE_JSON_PATH: ${{ inputs.package_json_path }}
                  NEW_VERSION: ${{ inputs.version }}
              run: |
                  set -euo pipefail
                  ACTUAL_VERSION="$(node -p "require('./${PACKAGE_JSON_PATH}').version")"

                  if [ "$ACTUAL_VERSION" != "$NEW_VERSION" ]; then
                    echo "Expected ${PACKAGE_JSON_PATH} version '$NEW_VERSION' but found '$ACTUAL_VERSION'."
                    exit 1
                  fi

            - name: Ensure only expected files changed
              shell: bash
              env:
                  PACKAGE_JSON_PATH: ${{ inputs.package_json_path }}
                  PACKAGE_LOCK_PATH: ${{ inputs.package_lock_path }}
                  EXTRA_COMMIT_PATHS: ${{ inputs.extra_commit_paths }}
              run: |
                  set -euo pipefail

                  mapfile -t changed_files < <(git status --porcelain | awk '{print $2}')

                  if [ ${#changed_files[@]} -eq 0 ]; then
                    echo "No files changed after version bump."
                    exit 1
                  fi

                  allowed=("$PACKAGE_JSON_PATH")
                  if [ -n "$PACKAGE_LOCK_PATH" ] && [ -f "$PACKAGE_LOCK_PATH" ]; then
                    allowed+=("$PACKAGE_LOCK_PATH")
                  fi

                  if [ -n "$EXTRA_COMMIT_PATHS" ]; then
                    while IFS= read -r path; do
                      [ -n "$path" ] && allowed+=("$path")
                    done <<< "$EXTRA_COMMIT_PATHS"
                  fi

                  for file in "${changed_files[@]}"; do
                    ok=false
                    for allowed_file in "${allowed[@]}"; do
                      if [ "$file" = "$allowed_file" ]; then
                        ok=true
                        break
                      fi
                    done

                    if [ "$ok" = false ]; then
                      echo "Unexpected changed file after version bump: $file"
                      printf 'Allowed files:\n%s\n' "${allowed[@]}"
                      exit 1
                    fi
                  done

            - name: Commit version bump
              shell: bash
              env:
                  PACKAGE_JSON_PATH: ${{ inputs.package_json_path }}
                  PACKAGE_LOCK_PATH: ${{ inputs.package_lock_path }}
                  EXTRA_COMMIT_PATHS: ${{ inputs.extra_commit_paths }}
                  COMMIT_TEMPLATE: ${{ inputs.commit_message }}
                  OLD_VERSION: ${{ steps.package-meta.outputs.old_version }}
                  NEW_VERSION: ${{ inputs.version }}
                  TAG_NAME: ${{ steps.package-meta.outputs.tag }}
                  PACKAGE_NAME: ${{ steps.package-meta.outputs.package_name }}
              run: |
                  set -euo pipefail

                  COMMIT_MESSAGE="${COMMIT_TEMPLATE//\{old\}/$OLD_VERSION}"
                  COMMIT_MESSAGE="${COMMIT_MESSAGE//\{new\}/$NEW_VERSION}"
                  COMMIT_MESSAGE="${COMMIT_MESSAGE//\{tag\}/$TAG_NAME}"
                  COMMIT_MESSAGE="${COMMIT_MESSAGE//\{package\}/$PACKAGE_NAME}"

                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git add "$PACKAGE_JSON_PATH"

                  if [ -n "$PACKAGE_LOCK_PATH" ] && [ -f "$PACKAGE_LOCK_PATH" ]; then
                    git add "$PACKAGE_LOCK_PATH"
                  fi

                  if [ -n "$EXTRA_COMMIT_PATHS" ]; then
                    while IFS= read -r path; do
                      [ -n "$path" ] && git add "$path"
                    done <<< "$EXTRA_COMMIT_PATHS"
                  fi

                  git commit -m "$COMMIT_MESSAGE"
                  git push origin "HEAD:${GITHUB_REF_NAME}"

            - name: Create tag
              shell: bash
              env:
                  TAG_NAME: ${{ steps.package-meta.outputs.tag }}
              run: |
                  set -euo pipefail
                  git tag "$TAG_NAME"
                  git push origin "$TAG_NAME"

            - name: Create GitHub release
              shell: bash
              env:
                  GH_TOKEN: ${{ github.token }}
                  TAG_NAME: ${{ steps.package-meta.outputs.tag }}
                  CREATE_LATEST: ${{ inputs.create_latest }}
              run: |
                  set -euo pipefail

                  LATEST_FLAG="--latest=false"
                  if [ "$CREATE_LATEST" = "true" ]; then
                    LATEST_FLAG="--latest"
                  fi

                  gh release create "$TAG_NAME" \
                    --title "$TAG_NAME" \
                    --generate-notes \
                    $LATEST_FLAG

    publish-npm:
        if: ${{ inputs.publish_target == 'npm' }}
        needs: release
        uses: krudi/reusable-actions/.github/workflows/publish-npm.yaml@main
        with:
            working_directory: ${{ inputs.working_directory }}
            workspace: ${{ inputs.workspace }}
            build_command: ${{ inputs.build_command }}
            check_command: ${{ inputs.check_command }}
            install_command: ${{ inputs.install_command }}
            node_version_file: ${{ inputs.node_version_file }}
            npm_access: ${{ inputs.npm_access }}
            npm_provenance: ${{ inputs.npm_provenance }}
            npm_tag: ${{ needs.release.outputs.tag }}
            checkout_fetch_depth: ${{ inputs.checkout_fetch_depth }}
            checkout_ref: ${{ needs.release.outputs.tag }}
        secrets:
            NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}

    publish-vscode:
        if: ${{ inputs.publish_target == 'vscode' }}
        needs: release
        uses: krudi/reusable-actions/.github/workflows/publish-vscode.yaml@main
        with:
            working_directory: ${{ inputs.working_directory }}
            install_command: ${{ inputs.install_command }}
            check_command: ${{ inputs.check_command }}
            package_command: ${{ inputs.package_command }}
            publish_command: ${{ inputs.publish_command }}
            node_version_file: ${{ inputs.node_version_file }}
            vsce_glob: ${{ inputs.vsce_glob }}
            checkout_fetch_depth: ${{ inputs.checkout_fetch_depth }}
            checkout_ref: ${{ needs.release.outputs.tag }}
            release_latest: ${{ inputs.create_latest }}
            release_tag: ${{ needs.release.outputs.tag }}
        secrets:
            VSCE_PAT: ${{ secrets.VSCE_PAT }}
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
